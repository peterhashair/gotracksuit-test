name: CI

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check
        run: deno check .

      - name: Lint
        run: deno lint

      - name: Test (client)
        run: deno task test:client

      - name: Test (server)
        run: deno task test:server
